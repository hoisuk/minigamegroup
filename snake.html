<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스네이크 — 미니 게임 모음</title>
<style>
  :root {
    --void: #dfe3e8; --surface: #eef1f4; --surface-2: #f7f9fb;
    --ink: #171c22; --fog: #57616d; --line: #cdd4dc; --live: #e63329;
    --grid-a: #cfe8d0; --grid-b: #c6e2c8; --snake: #2f9e5b; --snake-head: #227a44; --food: #e63329;
  }
  @media (prefers-color-scheme: dark) {
    :root { --void: #0e1116; --surface: #161b22; --surface-2: #1c222b; --ink: #eef1f4; --fog: #97a1ad; --line: #2a313b; --live: #ff4136; --grid-a: #12181a; --grid-b: #0f1416; --snake: #3fb56b; --snake-head: #6fe39b; --food: #ff5145; }
  }
  :root[data-theme="light"] { --void: #dfe3e8; --surface: #eef1f4; --surface-2: #f7f9fb; --ink: #171c22; --fog: #57616d; --line: #cdd4dc; --live: #e63329; --grid-a: #cfe8d0; --grid-b: #c6e2c8; --snake: #2f9e5b; --snake-head: #227a44; --food: #e63329; }
  :root[data-theme="dark"] { --void: #0e1116; --surface: #161b22; --surface-2: #1c222b; --ink: #eef1f4; --fog: #97a1ad; --line: #2a313b; --live: #ff4136; --grid-a: #12181a; --grid-b: #0f1416; --snake: #3fb56b; --snake-head: #6fe39b; --food: #ff5145; }

  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: flex; flex-direction: column; background: var(--void); color: var(--ink); font-family: "Segoe UI", system-ui, -apple-system, "Malgun Gothic", sans-serif; line-height: 1.6; -webkit-font-smoothing: antialiased; user-select: none; }

  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 16px 24px; border-bottom: 1px solid var(--line); background: var(--surface); position: sticky; top: 0; z-index: 10; flex-wrap: wrap; }
  .back { text-decoration: none; color: var(--ink); font-weight: 600; display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border: 1px solid var(--line); background: var(--surface-2); transition: border-color .15s; }
  .back:hover { border-color: var(--live); }
  .topbar .name { font-weight: 800; letter-spacing: -.01em; display: inline-flex; align-items: center; gap: 8px; }
  .topbar .name .en { font-family: "SF Mono", monospace; font-size: .62rem; letter-spacing: .3em; text-transform: uppercase; color: var(--live); }
  .theme-toggle { font-family: "SF Mono", monospace; font-size: .78rem; background: var(--surface-2); color: var(--ink); border: 1px solid var(--line); padding: 8px 14px; cursor: pointer; }
  .theme-toggle:hover { border-color: var(--live); }

  .stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; padding: 32px 20px; }
  .scorebar { display: flex; gap: 12px; align-items: stretch; flex-wrap: wrap; justify-content: center; }
  .scorebox { background: var(--surface); border: 1px solid var(--line); padding: 8px 18px; text-align: center; min-width: 90px; }
  .scorebox .lbl { font-family: "SF Mono", monospace; font-size: .62rem; letter-spacing: .18em; text-transform: uppercase; color: var(--fog); }
  .scorebox .val { font-size: 1.5rem; font-weight: 800; font-variant-numeric: tabular-nums; }
  .btn { font-family: "SF Mono", monospace; font-size: .82rem; padding: 10px 18px; cursor: pointer; background: var(--live); color: #fff; border: 0; }
  .btn:hover { filter: brightness(1.08); }

  .board-wrap { position: relative; }
  canvas { display: block; width: min(92vw, 440px); height: auto; border: 4px solid var(--line); border-radius: 6px; background: var(--grid-a); touch-action: none; }
  .overlay { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 14px; background: rgba(0,0,0,.62); border-radius: 6px; color: #fff; text-align: center; padding: 20px; }
  .overlay.show { display: flex; }
  .overlay h2 { margin: 0; font-size: 1.8rem; font-weight: 800; }
  .overlay p { margin: 0; opacity: .85; }

  .hint { font-size: .88rem; color: var(--fog); text-align: center; max-width: 440px; }
  footer { padding: 22px 24px; border-top: 1px solid var(--line); color: var(--fog); text-align: center; }
  .mono { font-family: "SF Mono", "Consolas", monospace; font-size: .78rem; letter-spacing: .04em; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back" href="index.html">← 게임 모음</a>
  <span class="name">🐍 스네이크 <span class="en">Snake</span></span>
  <button class="theme-toggle" id="themeToggle">🌗 테마</button>
</div>

<div class="stage">
  <div class="scorebar">
    <div class="scorebox"><div class="lbl">점수</div><div class="val" id="score">0</div></div>
    <div class="scorebox"><div class="lbl">최고점</div><div class="val" id="best">0</div></div>
    <button class="btn" id="startBtn">시작</button>
  </div>

  <div class="board-wrap">
    <canvas id="game" width="420" height="420"></canvas>
    <div class="overlay show" id="overlay">
      <h2 id="ovTitle">🐍 스네이크</h2>
      <p id="ovText">시작 버튼 또는 방향키로 출발!</p>
    </div>
  </div>

  <div class="hint">방향키 / WASD 로 이동 · 스페이스로 일시정지 · 모바일은 스와이프. 벽과 몸에 부딪히면 끝!</div>
</div>

<footer><span class="mono">🐍 스네이크 · 미니 게임 모음</span></footer>

<script>
/* ===== theme toggle (shared) ===== */
(function () {
  const root = document.documentElement;
  const btn = document.getElementById('themeToggle');
  const saved = localStorage.getItem('mg-theme');
  if (saved) root.setAttribute('data-theme', saved);
  btn && btn.addEventListener('click', () => {
    const cur = root.getAttribute('data-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    const next = cur === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('mg-theme', next);
  });
})();

/* ===== snake ===== */
(function () {
  const CELLS = 21;                 // grid dimension
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const SIZE = canvas.width / CELLS;
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ovTitle');
  const ovText = document.getElementById('ovText');
  const startBtn = document.getElementById('startBtn');

  const css = k => getComputedStyle(document.documentElement).getPropertyValue(k).trim();

  let snake, dir, nextDir, food, score, best = +(localStorage.getItem('mg-snake-best') || 0);
  let running = false, paused = false, tickMs, acc = 0, lastTs = 0, rafId = null;
  bestEl.textContent = best;

  function placeFood() {
    while (true) {
      const f = { x: Math.floor(Math.random() * CELLS), y: Math.floor(Math.random() * CELLS) };
      if (!snake.some(s => s.x === f.x && s.y === f.y)) { food = f; return; }
    }
  }

  function resetState() {
    snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir = { x: 1, y: 0 }; nextDir = { x: 1, y: 0 };
    score = 0; tickMs = 140; acc = 0;
    scoreEl.textContent = 0;
    placeFood();
  }

  function start() {
    resetState();
    running = true; paused = false;
    overlay.classList.remove('show');
    lastTs = 0;
    if (!rafId) rafId = requestAnimationFrame(loop);
  }

  function gameOver() {
    running = false;
    if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('mg-snake-best', best); }
    ovTitle.textContent = '💥 게임 오버';
    ovText.textContent = `점수 ${score} · 시작 버튼으로 다시`;
    overlay.classList.add('show');
    startBtn.textContent = '다시 시작';
  }

  function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    // wall collision
    if (head.x < 0 || head.x >= CELLS || head.y < 0 || head.y >= CELLS) return gameOver();
    // self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score++; scoreEl.textContent = score;
      if (tickMs > 70) tickMs -= 3;   // speed up gradually
      placeFood();
    } else {
      snake.pop();
    }
  }

  function draw() {
    // checker background
    for (let y = 0; y < CELLS; y++) for (let x = 0; x < CELLS; x++) {
      ctx.fillStyle = (x + y) % 2 ? css('--grid-b') : css('--grid-a');
      ctx.fillRect(x * SIZE, y * SIZE, SIZE, SIZE);
    }
    // food
    ctx.fillStyle = css('--food');
    ctx.beginPath();
    ctx.arc((food.x + .5) * SIZE, (food.y + .5) * SIZE, SIZE * 0.36, 0, Math.PI * 2);
    ctx.fill();
    // snake
    for (let i = snake.length - 1; i >= 0; i--) {
      ctx.fillStyle = i === 0 ? css('--snake-head') : css('--snake');
      const s = snake[i], pad = 1.5;
      ctx.fillRect(s.x * SIZE + pad, s.y * SIZE + pad, SIZE - pad * 2, SIZE - pad * 2);
    }
  }

  function loop(ts) {
    rafId = requestAnimationFrame(loop);
    if (!running || paused) { lastTs = ts; draw(); return; }
    if (!lastTs) lastTs = ts;
    acc += ts - lastTs; lastTs = ts;
    while (acc >= tickMs) { step(); acc -= tickMs; if (!running) break; }
    draw();
  }

  function setDir(x, y) {
    // prevent 180° reversal
    if (dir.x === -x && dir.y === -y) return;
    nextDir = { x, y };
  }

  const KEYS = {
    ArrowLeft: [-1, 0], ArrowRight: [1, 0], ArrowUp: [0, -1], ArrowDown: [0, 1],
    a: [-1, 0], d: [1, 0], w: [0, -1], s: [0, 1],
  };
  window.addEventListener('keydown', e => {
    if (e.key === ' ') { e.preventDefault(); if (running) { paused = !paused; if (paused) { ovTitle.textContent = '⏸ 일시정지'; ovText.textContent = '스페이스로 계속'; overlay.classList.add('show'); } else overlay.classList.remove('show'); } return; }
    const d = KEYS[e.key];
    if (!d) return;
    e.preventDefault();
    if (!running) start();
    setDir(d[0], d[1]);
  });

  // touch swipe
  let sx = 0, sy = 0;
  canvas.addEventListener('touchstart', e => { const t = e.touches[0]; sx = t.clientX; sy = t.clientY; }, { passive: true });
  canvas.addEventListener('touchend', e => {
    const t = e.changedTouches[0];
    const dx = t.clientX - sx, dy = t.clientY - sy;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
    if (!running) start();
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
    else setDir(0, dy > 0 ? 1 : -1);
  }, { passive: true });

  startBtn.addEventListener('click', start);

  resetState();
  draw();
  rafId = requestAnimationFrame(loop);
})();
</script>
</body>
</html>
